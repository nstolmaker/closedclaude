server {
    listen 8443 ssl;
    server_name mcp.noah.space;

    ssl_certificate     /etc/letsencrypt/live/mcp.noah.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mcp.noah.space/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # SSE requires these
    proxy_buffering         off;
    proxy_cache             off;
    proxy_read_timeout      3600s;
    proxy_send_timeout      3600s;
    proxy_set_header        Host $host;
    proxy_set_header        X-Real-IP $remote_addr;
    proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_http_version      1.1;
    proxy_set_header        Connection '';

    set $auth_token "Bearer 0efebfff310e4f60a310a8a9ee429f5fc5ddfa27ebc92a4d66a7667f92eb8ae8";

    location / {
        if ($http_authorization != $auth_token) {
            return 401 "Unauthorized\n";
        }
        proxy_pass http://127.0.0.1:4001;
    }
}
